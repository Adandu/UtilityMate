version: '3.8'

services:
  utilitymate:
    build: .
    container_name: utilitymate
    restart: always
    ports:
      - "80:80"
    environment:
      - SECRET_KEY=$SECRET_KEY
      - ALLOWED_ORIGINS=http://localhost:80,http://localhost
    volumes:
      - utilitymate_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  utilitymate_data:
