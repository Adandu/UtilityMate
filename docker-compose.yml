version: '3.8'

services:
  utilitymate:
    build: .
    container_name: utilitymate
    restart: always
    ports:
      - "80:80"
    environment:
      - SECRET_KEY=${SECRET_KEY:-your_secret_key_change_me}
      - ALLOWED_ORIGINS=http://localhost:80,http://localhost
    volumes:
      - ./data:/app/data
