name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: changelog
        run: |
          # Get the current tag
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 $CURRENT_TAG^ 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # First release
            COMMITS=$(git log --oneline)
          else
            # Commits between tags
            COMMITS=$(git log ${PREVIOUS_TAG}..${CURRENT_TAG} --oneline)
          fi
          
          FEATURES=""
          IMPROVEMENTS=""
          FIXES=""
          
          # Parse commits by prefix
          while IFS= read -r line; do
            # Extract description (remove commit hash)
            DESC=$(echo "$line" | cut -d' ' -f2-)
            
            if [[ $DESC =~ ^feat: ]] || [[ $DESC =~ ^feat\( ]]; then
              FEATURES="${FEATURES}- ${DESC#feat: }\n"
            elif [[ $DESC =~ ^imp: ]] || [[ $DESC =~ ^imp\( ]] || [[ $DESC =~ ^refactor: ]] || [[ $DESC =~ ^style: ]]; then
              IMPROVEMENTS="${IMPROVEMENTS}- ${DESC#imp: }\n"
            elif [[ $DESC =~ ^fix: ]] || [[ $DESC =~ ^fix\( ]]; then
              FIXES="${FIXES}- ${DESC#fix: }\n"
            fi
          done <<< "$COMMITS"
          
          BODY=""
          if [ ! -z "$FEATURES" ]; then
            BODY="${BODY}### 🚀 New Features\n${FEATURES}\n"
          fi
          if [ ! -z "$IMPROVEMENTS" ]; then
            BODY="${BODY}### 🛠️ Improvements\n${IMPROVEMENTS}\n"
          fi
          if [ ! -z "$FIXES" ]; then
            BODY="${BODY}### 🐛 Bug Fixes\n${FIXES}\n"
          fi
          
          if [ -z "$BODY" ]; then
            BODY="Detailed changes for this release."
          fi
          
          # Output to github output using multiline support
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
