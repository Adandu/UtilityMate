name: Production Pipeline

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: 🐳 Build & Publish Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 🔍 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: 🚀 Create GitHub Release
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Generate Categorized Release Notes
        id: changelog
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 $CURRENT_TAG^ 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log ${PREVIOUS_TAG}..${CURRENT_TAG} --oneline)
          fi
          
          FEATURES=""
          IMPROVEMENTS=""
          FIXES=""
          
          while IFS= read -r line; do
            DESC=$(echo "$line" | cut -d' ' -f2-)
            if [[ $DESC =~ ^feat: ]] || [[ $DESC =~ ^feat\( ]]; then
              FEATURES="${FEATURES}- ${DESC#feat: }\n"
            elif [[ $DESC =~ ^imp: ]] || [[ $DESC =~ ^imp\( ]] || [[ $DESC =~ ^refactor: ]] || [[ $DESC =~ ^style: ]]; then
              IMPROVEMENTS="${IMPROVEMENTS}- ${DESC#imp: }\n"
            elif [[ $DESC =~ ^fix: ]] || [[ $DESC =~ ^fix\( ]]; then
              FIXES="${FIXES}- ${DESC#fix: }\n"
            fi
          done <<< "$COMMITS"
          
          BODY=""
          if [ ! -z "$FEATURES" ]; then BODY="${BODY}### 🚀 New Features\n${FEATURES}\n"; fi
          if [ ! -z "$IMPROVEMENTS" ]; then BODY="${BODY}### 🛠️ Improvements\n${IMPROVEMENTS}\n"; fi
          if [ ! -z "$FIXES" ]; then BODY="${BODY}### 🐛 Bug Fixes\n${FIXES}\n"; fi
          
          if [ -z "$BODY" ]; then BODY="Automated production release."; fi
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📢 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
